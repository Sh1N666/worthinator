syntax = "proto3";
option csharp_namespace = "ApiInator.Protos";
package worthinator;

message SearchGameRequest{
  string search_phrase = 1;
}
message SearchGameResponse{
  repeated GamePreview games = 1;
}

message GamePreview{
  string steamapp_id = 1;
  string name = 2;
  string tiny_image = 3;
}

message GetGameInfoRequest{
  string steamapp_id = 1;
}

message GetGameInfoResponse{
  string id = 1;
  double worth_factor = 2;
  PriceInfo price_info = 3;
  string tiny_image = 4;
  double rating_score = 5;
  int32 release_year = 6;
  HowLongToBeat how_long_to_beat = 7;
}

message HowLongToBeat{
  double main = 1;
  double main_extra = 2;
  double completionist = 3;
}
message PriceInfo{
  double actual_price = 1;
  double historical_low_price = 2;
  double initial_price = 3;
  string currency_code = 4;
}

service WorthinatorService {
  rpc SearchGame (SearchGameRequest) returns (SearchGameResponse);
  rpc GetGameInfo (GetGameInfoRequest) returns (GetGameInfoResponse);
}