syntax = "proto3";
option csharp_namespace = "ApiInator.Generated";
package worthinator;


service WorthinatorService {
  rpc SearchGame (SearchGameRequest) returns (SearchGameResponse);
  rpc GetGameInfo (GetGameInfoRequest) returns (GetGameInfoResponse);
}

message SearchGameRequest {
  string search_phrase = 1;
}

message SearchGameResponse {
  repeated GamePreview games = 1;
}

message GamePreview {
  int32 steam_app_id = 1;
  string name = 2;
  string tiny_image = 3;
}

message GetGameInfoRequest {
  int32 steam_app_id = 1;
}

message GetGameInfoResponse {
  string id = 1;
  int32 steam_app_id = 2;
  string name = 3;
  string short_description = 4;
  string release_date = 5;
  repeated string developers = 6;
  repeated string genres = 7;
  Platforms platforms = 8;
  MetacriticData metacritic = 9;
  SteamPriceData steam_price = 10;
  HltbData hltb = 11;
  GgDealsData gg_deals = 12;
  int32 worth_factor = 13;
}

message Platforms {
  bool windows = 1;
  bool mac = 2;
  bool linux = 3;
}

message MetacriticData {
  int32 score = 1;
  string url = 2;
}

message SteamPriceData {
  double initial = 1;
  double final = 2;
}

message HltbData {
  int32 game_id = 1;
  double main_story = 2;
  double main_extra = 3;
  double completionist = 4;
  double review_score = 5;
}

message GgDealsData {
  string url = 1;
  GgDealsPricesData prices = 2;
}

message GgDealsPricesData {
  double current_retail = 1;
  double current_keyshops = 2;
  double historical_retail = 3;
  double historical_keyshops = 4;
  string currency = 5;
}