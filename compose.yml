services:
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: Worthinator-db
    user: root
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=P@ssw0rd
      - MSSQL_PID=Developer
    ports:
      - "5443:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    networks:
      - Worthinator-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'P@ssw0rd' -Q 'SELECT 1' -No || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api-inator:
    build:
      context: .
      dockerfile: src/ApiInator/Dockerfile
    container_name: api-inator
    ports:
      - "13001:13001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=database;Database=WorthinatorDb;User Id=sa;Password=P@ssw0rd;TrustServerCertificate=True
    depends_on:
      database:
        condition: service_healthy
    networks:
      - Worthinator-net

  gateway:
    build:
      context: .
      dockerfile: src/Gateway.Frontend/Dockerfile
    container_name: gateway-frontend
    ports:
      - "443:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Kestrel__Endpoints__Https__Url=https://*:443
      - Kestrel__Certificates__Default__Password=P@ssw0rd
      - Kestrel__Certificates__Default__Path=/certs/gateway.pfx
      - ReverseProxy__Clusters__api-cluster__Destinations__destination1__Address=http://api-inator:13001
      - ReverseProxy__Clusters__portal-cluster__Destinations__destination1__Address=http://portal:80
    volumes:
      - ./certs:/certs:ro,Z
    depends_on:
      - api-inator
    networks:
      - Worthinator-net

  portal:
    build:
      context: ./src/Portal
      dockerfile: Dockerfile
    container_name: portal
    ports:
      - "4200:80"
    depends_on:
      - api-inator
    networks:
      - Worthinator-net

networks:
  Worthinator-net:
    driver: bridge

volumes:
  mssql-data: